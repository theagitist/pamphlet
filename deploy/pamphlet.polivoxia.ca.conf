server {
    server_name pamphlet.polivoxia.ca;

    # Max upload size (must match Express multer + .env limits)
    client_max_body_size 50M;

    # Cloudflare real IP handling
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    # Gzip compression for static assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Deny access to sensitive files
    location ~* \.(md|sh|yml|yaml|log|bak|swp)$ {
        deny all;
        return 404;
    }

    location ~* ^/(CLAUDE\.md|README\.md|PRD\.md|ecosystem\.config\.cjs|\.env)$ {
        deny all;
        return 404;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FORBIDDEN: Do not map PAMPHLET_STORAGE_ROOT as a static location.
    # Node.js middleware handles all file access.

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pamphlet.polivoxia.ca/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/pamphlet.polivoxia.ca/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = pamphlet.polivoxia.ca) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name pamphlet.polivoxia.ca;

    listen 80;
    return 404; # managed by Certbot


}